<script>
// Redirect faculty cards to their profile URL from YAML data attribute
document.addEventListener('DOMContentLoaded', function() {
  const facultySection = document.getElementById('faculty');
  if (!facultySection) return;

  const profileCards = facultySection.querySelectorAll('.group[data-profile-url]');

  profileCards.forEach(card => {
    const profileUrl = card.getAttribute('data-profile-url');
    if (!profileUrl) return;

    // Update image link
    const imageLink = card.querySelector('a[href*="/authors/"]');
    if (imageLink) {
      imageLink.href = profileUrl;
      imageLink.target = '_blank';
      imageLink.rel = 'noopener noreferrer';
    }

    // Update name link
    const nameLink = card.querySelector('h3 a');
    if (nameLink) {
      nameLink.href = profileUrl;
      nameLink.target = '_blank';
      nameLink.rel = 'noopener noreferrer';
    }
  });
});
</script>
