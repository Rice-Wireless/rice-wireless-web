# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
#     desired widget in your `content/home/` folder.
#   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: '#'
    weight: 10
  - name: News
    url: '/#news'
    weight: 20 
  - name: Events
    url: '/#events'
    weight: 30
  - name: Faculty
    url: '/#faculty'
    weight: 40
  - name: Alumni
    url: '/alumni'
    weight: 50

  - name: Projects
    url: '/#projects'
    weight: 60

  - name: Facilities
    url: '/#facilities'
    weight: 70

